<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Author List</title>
</head>
<body>
    <h1>List of Authors</h1>
    <a href="{% url 'create_author' %}">Add Author</a>
    <ul>
        {% for author in authors %}
        <li>
            {{ author.name }} {{ author.surname }} {{ author.patronymic }}
            <a href="{% url 'author_detail' author.id %}">View</a>
            <a href="{% url 'update_author' author.id %}">Edit</a>
            <a href="{% url 'delete_author' author.id %}">Delete</a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
