<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Author</title>
</head>
<body>
    <h1>Update Author</h1>
    <form method="post">
        {% csrf_token %}
        <label>Name:</label><input type="text" name="name" value="{{ author.name }}" required><br>
        <label>Surname:</label><input type="text" name="surname" value="{{ author.surname }}" required><br>
        <label>Patronymic:</label><input type="text" name="patronymic" value="{{ author.patronymic }}" required><br>
        <button type="submit">Save Changes</button>
    </form>
    <a href="{% url 'author_detail' author.id %}">Back</a>
</body>
</html>
