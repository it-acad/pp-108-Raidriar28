<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User List</title>
</head>
<body>
    <h1>User List</h1>
    <ul>
        {% for user in users %}
        <li>
            {{ user.first_name }} {{ user.last_name }} - {{ user.email }}
            <a href="{% url 'user_detail' user.id %}">Details</a>
            <a href="{% url 'delete_user' user.id %}">Delete</a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
