<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book List</title>
</head>
<body>
    <h1>List of Books</h1>
    <a href="{% url 'create_book' %}">Add Book</a>
    <ul>
        {% for book in books %}
        <li>
            {{ book.name }} - {{ book.description }}
            <a href="{% url 'book_detail' book.id %}">View</a>
            <a href="{% url 'update_book' book.id %}">Edit</a>
            <a href="{% url 'delete_book' book.id %}">Delete</a>
        </li>
        {% endfor %}
    </ul>
</body>
</html>
