<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Details</title>
</head>
<body>
    <h1>Order Details</h1>
    <p>Order ID: {{ order.id }}</p>
    <p>Book: {{ order.book.name }}</p>
    <p>User: {{ order.user.username }}</p>
    <p>Created At: {{ order.created_at }}</p>
    <p>Planned End At: {{ order.plated_end_at }}</p>
    <p>End At: {{ order.end_at }}</p>
    <a href="{% url 'order_list' %}">Back to List</a>
</body>
</html>
