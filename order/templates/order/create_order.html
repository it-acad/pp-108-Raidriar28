<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Order</title>
</head>
<body>
    <h1>Create a New Order</h1>
    <form method="post">
        {% csrf_token %}
        <label>User:</label>
        <select name="user" required>
            {% for user in users %}
            <option value="{{ user.id }}">{{ user.username }}</option>
            {% endfor %}
        </select><br>
        <label>Book:</label>
        <select name="book" required>
            {% for book in books %}
            <option value="{{ book.id }}">{{ book.name }}</option>
            {% endfor %}
        </select><br>
        <label>Planned End Date:</label><input type="datetime-local" name="plated_end_at" required><br>
        <button type="submit">Create</button>
    </form>
    <a href="{% url 'order_list' %}">Back to List</a>
</body>
</html>
