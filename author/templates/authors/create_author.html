<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Author</title>
</head>
<body>
    <h1>Create a New Author</h1>
    <form method="post">
        {% csrf_token %}
        <label>Name:</label><input type="text" name="name" required><br>
        <label>Surname:</label><input type="text" name="surname" required><br>
        <label>Patronymic:</label><input type="text" name="patronymic" required><br>
        <button type="submit">Create</button>
    </form>
    <a href="{% url 'author:author_list' %}">Back to List</a>
</body>
</html>
